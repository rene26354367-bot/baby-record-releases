name: Supabase Keepalive

# 每 3 天 ping 一次 Supabase，避免免費層 7 天閒置自動暫停
on:
  schedule:
    - cron: '17 21 */3 * *'   # UTC 21:17（台灣早上 5:17），避開整點壅塞
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ping Supabase REST API
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://gjijpduxcaeefcbpclah.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: sb_publishable_IRLE9NnE3IzoOCCKJP5w3Q_erMI1Qyu")
          echo "Supabase HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::Supabase ping failed (HTTP $code) — 專案可能已暫停，請到 Dashboard 檢查"
            exit 1
          fi

      # GitHub 對 60 天無活動的倉庫會停用排程；每 25 天以上自動提交一次標記保持活躍
      - name: Refresh keepalive marker if stale
        run: |
          need_commit=1
          if [ -f .keepalive ]; then
            last=$(date -d "$(cat .keepalive)" +%s 2>/dev/null || echo 0)
            now=$(date +%s)
            age_days=$(( (now - last) / 86400 ))
            [ "$age_days" -lt 25 ] && need_commit=0
          fi
          if [ "$need_commit" = "1" ]; then
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive
            git config user.name "keepalive-bot"
            git config user.email "actions@users.noreply.github.com"
            git add .keepalive
            git commit -m "chore: keepalive marker"
            git push
          else
            echo "marker is fresh ($age_days days), skip commit"
          fi
